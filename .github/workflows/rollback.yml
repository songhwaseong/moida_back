name: Rollback

on:
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  CONTAINER_NAME: moida-backend

jobs:
  rollback-ec2-1:
    runs-on: ubuntu-latest

    steps:
      - name: 1번 EC2 롤백
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_1 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            STATE_DIR="$HOME/.moida-deploy"
            CURRENT_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.current"
            PREVIOUS_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.previous"

            if [ ! -s "$PREVIOUS_FILE" ]; then
              echo "No previous successful image recorded."
              exit 1
            fi

            ROLLBACK_IMAGE=$(cat "$PREVIOUS_FILE")
            CURRENT_IMAGE=""
            if [ -s "$CURRENT_FILE" ]; then
              CURRENT_IMAGE=$(cat "$CURRENT_FILE")
            fi

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            docker pull "$ROLLBACK_IMAGE"

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 9000:9000 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e INSTANCE_NAME=moida-backend-ec2-1 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e FRONTEND_ORIGIN="${{ secrets.FRONTEND_ORIGIN }}" \
              -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
              -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              "$ROLLBACK_IMAGE"

            sleep 10
            test -n "$(docker ps -q --filter "name=^/${{ env.CONTAINER_NAME }}$" --filter "status=running")"
            HEALTH_OK=""
            for i in $(seq 1 12); do
              if curl -fsS http://localhost:9000/api/public/health; then
                HEALTH_OK="1"
                break
              fi
              sleep 5
            done
            test "$HEALTH_OK" = "1"

            if [ -n "$CURRENT_IMAGE" ]; then
              echo "$CURRENT_IMAGE" > "$PREVIOUS_FILE"
            fi
            echo "$ROLLBACK_IMAGE" > "$CURRENT_FILE"
            docker image prune -f

  rollback-ec2-2:
    runs-on: ubuntu-latest
    needs: rollback-ec2-1

    steps:
      - name: 2번 EC2 롤백
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_2 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            STATE_DIR="$HOME/.moida-deploy"
            CURRENT_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.current"
            PREVIOUS_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.previous"

            if [ ! -s "$PREVIOUS_FILE" ]; then
              echo "No previous successful image recorded."
              exit 1
            fi

            ROLLBACK_IMAGE=$(cat "$PREVIOUS_FILE")
            CURRENT_IMAGE=""
            if [ -s "$CURRENT_FILE" ]; then
              CURRENT_IMAGE=$(cat "$CURRENT_FILE")
            fi

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            docker pull "$ROLLBACK_IMAGE"

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 9000:9000 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e INSTANCE_NAME=moida-backend-ec2-2 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e FRONTEND_ORIGIN="${{ secrets.FRONTEND_ORIGIN }}" \
              -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
              -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              "$ROLLBACK_IMAGE"

            sleep 10
            test -n "$(docker ps -q --filter "name=^/${{ env.CONTAINER_NAME }}$" --filter "status=running")"
            HEALTH_OK=""
            for i in $(seq 1 12); do
              if curl -fsS http://localhost:9000/api/public/health; then
                HEALTH_OK="1"
                break
              fi
              sleep 5
            done
            test "$HEALTH_OK" = "1"

            if [ -n "$CURRENT_IMAGE" ]; then
              echo "$CURRENT_IMAGE" > "$PREVIOUS_FILE"
            fi
            echo "$ROLLBACK_IMAGE" > "$CURRENT_FILE"
            docker image prune -f

  notify-discord:
    runs-on: ubuntu-latest
    needs: [rollback-ec2-1, rollback-ec2-2]
    if: always()

    steps:
      - name: Notify Discord on rollback success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skipping Discord notification."
            exit 0
          fi

          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\":\"[MOIDA Backend] Rollback succeeded\nRepository: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord on rollback failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skipping Discord notification."
            exit 0
          fi

          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\":\"[MOIDA Backend] Rollback failed\nRepository: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"

