name: CD

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '.github/workflows/rollback.yml'
      - 'docs/**'
      - '*.md'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY: moida-backend
  IMAGE_NAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/moida-backend
  CONTAINER_NAME: moida-backend
  STATE_DIR: $HOME/.moida-deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: JAR 빌드 (테스트 제외)
        run: ./gradlew bootJar --no-daemon -x test

      - name: AWS 인증 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Amazon ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-ec2-1:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 1번 EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_1 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"
            STATE_DIR="$HOME/.moida-deploy"
            CURRENT_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.current"
            PREVIOUS_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.previous"
            mkdir -p "$STATE_DIR"

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            docker pull "$IMAGE"

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 9000:9000 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e INSTANCE_NAME=moida-backend-ec2-1 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e FRONTEND_ORIGIN="${{ secrets.FRONTEND_ORIGIN }}" \
              -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
              -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              "$IMAGE"

            sleep 10
            test -n "$(docker ps -q --filter "name=^/${{ env.CONTAINER_NAME }}$" --filter "status=running")"
            HEALTH_OK=""
            for i in $(seq 1 12); do
              if curl -fsS http://localhost:9000/api/public/health; then
                HEALTH_OK="1"
                break
              fi
              sleep 5
            done
            test "$HEALTH_OK" = "1"

            if [ -s "$CURRENT_FILE" ]; then
              cp "$CURRENT_FILE" "$PREVIOUS_FILE"
            fi
            echo "$IMAGE" > "$CURRENT_FILE"
            docker image prune -f

  deploy-ec2-2:
    runs-on: ubuntu-latest
    needs: deploy-ec2-1

    steps:
      - name: 2번 EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_2 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"
            STATE_DIR="$HOME/.moida-deploy"
            CURRENT_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.current"
            PREVIOUS_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.previous"
            mkdir -p "$STATE_DIR"

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            docker pull "$IMAGE"

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 9000:9000 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e INSTANCE_NAME=moida-backend-ec2-2 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e FRONTEND_ORIGIN="${{ secrets.FRONTEND_ORIGIN }}" \
              -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
              -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              "$IMAGE"

            sleep 10
            test -n "$(docker ps -q --filter "name=^/${{ env.CONTAINER_NAME }}$" --filter "status=running")"
            HEALTH_OK=""
            for i in $(seq 1 12); do
              if curl -fsS http://localhost:9000/api/public/health; then
                HEALTH_OK="1"
                break
              fi
              sleep 5
            done
            test "$HEALTH_OK" = "1"

            if [ -s "$CURRENT_FILE" ]; then
              cp "$CURRENT_FILE" "$PREVIOUS_FILE"
            fi
            echo "$IMAGE" > "$CURRENT_FILE"
            docker image prune -f

  notify-discord:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-ec2-1, deploy-ec2-2]
    if: always()

    steps:
      - name: Notify Discord on CD success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skipping Discord notification."
            exit 0
          fi

          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\":\"[MOIDA Backend] CD succeeded\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nImage: ${{ env.IMAGE_NAME }}:${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord on CD failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skipping Discord notification."
            exit 0
          fi

          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\":\"[MOIDA Backend] CD failed\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"

