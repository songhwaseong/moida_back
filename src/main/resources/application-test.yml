spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/moida?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  # 테스트 전용 키. CI 는 JWT_SECRET 을 주입하므로 그 값이 우선되고, 미주입 시 이 기본값으로 동작.
  secret: ${JWT_SECRET:moida-test-secret-key-must-be-at-least-32-bytes-long}

cors:
  allowed-origins:
    - http://localhost:5173

logging:
  level:
    com.moida: debug
