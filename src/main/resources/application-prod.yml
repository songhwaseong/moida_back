spring:
  datasource:
    # sslMode=REQUIRED: RDS 와의 연결을 TLS 로 강제(평문 전송 방지). RDS 는 기본적으로 SSL 을 지원한다.
    url: ${DB_URL:jdbc:mysql://dbmoida.czmwck6mces8.ap-northeast-2.rds.amazonaws.com:3306/moida?sslMode=REQUIRED&useUnicode=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:moidadb}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET time_zone = '+09:00'

  jpa:
    hibernate:
      # 주의: 운영에서 update 는 스키마를 자동 변경해 위험할 수 있다.
      # 안전 전환 절차: (1) 신규 컬럼 포함 변경을 update 로 한 번 배포해 DB 에 반영한 뒤
      #   (2) 스키마 확인 후 validate 로 전환한다(엔티티-DB 불일치를 부팅 시 조기 발견).
      #   장기적으로는 Flyway/Liquibase 마이그레이션 도입을 권장한다.
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
    show-sql: false

cors:
  allowed-origins:
    - ${FRONTEND_ORIGIN}

# 운영은 EC2 2대 이상이므로 Redis Pub/Sub 릴레이를 켠다.
# Redis 접속 정보(SPRING_DATA_REDIS_HOST/PORT/PASSWORD)는 cd.yml 의 -e 로 주입된다.
moida:
  realtime:
    redis-relay:
      enabled: ${REDIS_RELAY_ENABLED:true}

logging:
  level:
    com.moida: info

auth:
  cookie:
    secure: ${AUTH_COOKIE_SECURE:true}

# Passwordless push connector — 공개 URL(민감정보 아님)이라 prod 고정값으로 하드코딩.
# 주의: cd.yml 에서 -e PASSWORDLESS_PUSH_CONNECTOR_URL 을 주입하면 env 가 이 값을 덮어쓰므로
#       cd.yml 의 해당 -e 라인은 제거해야 한다.
passwordless:
  push-connector-url: wss://moida.site/pwless-ws/
