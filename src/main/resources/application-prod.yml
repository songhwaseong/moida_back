spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://dbmoida.czmwck6mces8.ap-northeast-2.rds.amazonaws.com:3306/moida?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:moidadb}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

cors:
  allowed-origins:
    - ${FRONTEND_ORIGIN}

# 운영은 EC2 2대 이상이므로 Redis Pub/Sub 릴레이를 켠다.
# Redis 접속 정보(SPRING_DATA_REDIS_HOST/PORT/PASSWORD)는 cd.yml 의 -e 로 주입된다.
moida:
  realtime:
    redis-relay:
      enabled: ${REDIS_RELAY_ENABLED:true}

logging:
  level:
    com.moida: info

# Passwordless push connector — 공개 URL(민감정보 아님)이라 prod 고정값으로 하드코딩.
# 주의: cd.yml 에서 -e PASSWORDLESS_PUSH_CONNECTOR_URL 을 주입하면 env 가 이 값을 덮어쓰므로
#       cd.yml 의 해당 -e 라인은 제거해야 한다.
passwordless:
  push-connector-url: wss://moida.site/pwless-ws/
