spring:
  application:
    name: moida-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

server:
  port: 9000
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: ${JWT_SECRET:moida-local-secret-key-must-be-at-least-32-bytes-long}
  access-token-validity: 3600000
  refresh-token-validity: 1209600000

logging:
  level:
    org.hibernate.SQL: info
    org.hibernate.orm.jdbc.bind: info
    com.moida: debug
social:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    redirect-uri: ${KAKAO_REDIRECT_URI}
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}

tracking:
  sweettracker:
    api-key: ${SWEETTRACKER_API_KEY:}
    base-url: https://info.sweettracker.co.kr/api/v1

# 휴대폰 인증(SMS) — 솔라피. 키/발신번호는 환경변수로 주입한다.
# 값이 비어 있으면 SmsService 가 개발 모드로 동작(실제 발송 없이 인증번호를 로그로 출력)한다.
solapi:
  api-key: ${SOLAPI_API_KEY:}
  api-secret: ${SOLAPI_API_SECRET:}
  sender: ${SOLAPI_SENDER:}
