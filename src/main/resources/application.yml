spring:
  application:
    name: moida-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # WebSocket 멀티 인스턴스 릴레이용 Redis 연결. relay 비활성(local/test)에서는 실제로 연결하지 않는다.
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2s

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 9000
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: ${JWT_SECRET:moida-local-secret-key-must-be-at-least-32-bytes-long}
  access-token-validity: 3600000
  refresh-token-validity: 1209600000

passwordless:
  rest-check-url: ${PASSWORDLESS_REST_CHECK_URL:}
  simple-autopassword-url: ${PASSWORDLESS_SIMPLE_AUTOPASSWORD_URL:}
  push-connector-url: ${PASSWORDLESS_PUSH_CONNECTOR_URL:}
  server-id: ${PASSWORDLESS_SERVER_ID:}
  server-key: ${PASSWORDLESS_SERVER_KEY:}
  corp-id: ${PASSWORDLESS_CORP_ID:}

logging:
  level:
    org.hibernate.SQL: info
    org.hibernate.orm.jdbc.bind: info
    com.moida: debug
social:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    redirect-uri: ${KAKAO_REDIRECT_URI}
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}

tracking:
  sweettracker:
    api-key: ${SWEETTRACKER_API_KEY:}
    base-url: https://info.sweettracker.co.kr/api/v1

moida:
  # 실시간(WebSocket) 멀티 인스턴스 릴레이. 기본 비활성 → 단일 인스턴스로 동작(로컬/테스트).
  # 운영(application-prod)에서 true 로 켜면 Redis Pub/Sub 로 전 인스턴스에 전파된다.
  realtime:
    redis-relay:
      enabled: ${REDIS_RELAY_ENABLED:false}
  images:
    bucket: ${MOIDA_S3_BUCKET:}
    region: ${AWS_REGION:ap-northeast-2}
    public-base-url: ${MOIDA_IMAGE_PUBLIC_BASE_URL:}
    presign-ttl-seconds: ${MOIDA_S3_PRESIGN_TTL_SECONDS:300}
    max-file-size-bytes: ${MOIDA_IMAGE_MAX_FILE_SIZE_BYTES:10485760}


# 휴대폰 인증(SMS) — 솔라피. 키/발신번호는 환경변수로 주입한다.
# 값이 비어 있으면 SmsService 가 개발 모드로 동작(실제 발송 없이 인증번호를 로그로 출력)한다.
solapi:
  api-key: ${SOLAPI_API_KEY:}
  api-secret: ${SOLAPI_API_SECRET:}
  sender: ${SOLAPI_SENDER:}

