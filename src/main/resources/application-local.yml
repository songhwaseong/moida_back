spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/moida?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  # 로컬 개발 전용 키 (운영 비밀과 무관). 운영은 JWT_SECRET 환경변수로 주입.
  secret: ${JWT_SECRET:moida-local-secret-key-must-be-at-least-32-bytes-long}

cors:
  allowed-origins:
    - http://localhost:5173
    - http://127.0.0.1:5173
    - http://localhost:3000
    - http://localhost:4173

logging:
  level:
    com.moida: debug
